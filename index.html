<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 기출문제 풀이 플랫폼</title>
    <script src="https://tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-50 h-screen flex flex-col">

    <!-- 상단 네비게이션 -->
    <header class="bg-white border-b px-6 py-3 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <h1 class="text-xl font-bold text-blue-600 italic">AI Exam Master</h1>
            <span class="bg-blue-100 text-blue-700 text-xs font-semibold px-2.5 py-0.5 rounded">2024년 기출문제</span>
        </div>
        <div class="flex gap-4 items-center">
            <span class="text-sm font-medium text-gray-600">진행률: 12/20 (60%)</span>
            <button class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-blue-700 transition">제출하기</button>
        </div>
    </header>

    <!-- 메인 콘텐츠 영역 -->
    <main class="flex-1 flex overflow-hidden">
        
        <!-- 왼쪽: 문제 영역 -->
        <section class="w-1/2 p-8 overflow-y-auto custom-scrollbar bg-white border-r">
            <div class="max-w-2xl mx-auto">
                <div class="mb-6">
                    <span class="text-gray-400 font-bold text-lg">Q 12.</span>
                    <h2 class="text-xl font-semibold mt-2 leading-relaxed">
                        다음 중 인공지능 모델의 '과적합(Overfitting)'을 방지하기 위한 방법으로 가장 적절하지 않은 것은?
                    </h2>
                </div>

                <div class="space-y-4">
                    <label class="flex items-center p-4 border rounded-xl hover:bg-blue-50 cursor-pointer transition group border-blue-200 bg-blue-50">
                        <input type="radio" name="q12" class="w-4 h-4 text-blue-600" checked>
                        <span class="ml-4 text-gray-700">1) 훈련 데이터의 양을 늘린다.</span>
                    </label>
                    <label class="flex items-center p-4 border rounded-xl hover:bg-gray-100 cursor-pointer transition group">
                        <input type="radio" name="q12" class="w-4 h-4 text-blue-600">
                        <span class="ml-4 text-gray-700">2) 규제(Regularization) 기법을 적용한다.</span>
                    </label>
                    <label class="flex items-center p-4 border rounded-xl hover:bg-gray-100 cursor-pointer transition group">
                        <input type="radio" name="q12" class="w-4 h-4 text-blue-600">
                        <span class="ml-4 text-gray-700">3) 특성(Feature)의 수를 최대한 늘린다.</span>
                    </label>
                    <label class="flex items-center p-4 border rounded-xl hover:bg-gray-100 cursor-pointer transition group">
                        <input type="radio" name="q12" class="w-4 h-4 text-blue-600">
                        <span class="ml-4 text-gray-700">4) 드롭아웃(Dropout)을 적용한다.</span>
                    </label>
                </div>
            </div>
        </section>

        <!-- 오른쪽: AI 피드백 영역 -->
        <aside class="w-1/2 bg-gray-50 flex flex-col">
            <div class="p-6 flex-1 overflow-y-auto custom-scrollbar">
                <!-- AI 인사이트 메시지 -->
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 mb-6">
                    <div class="flex items-center gap-2 mb-4 text-blue-600 font-bold">
                        <i class="fas fa-robot"></i>
                        <span>AI 분석 및 해설</span>
                    </div>
                    <p class="text-gray-600 leading-relaxed mb-4">
                        정답은 <strong class="text-blue-600 underline">3번</strong>입니다. 과적합을 방지하기 위해서는 불필요한 특성을 줄이거나 차원을 축소해야 합니다. 특성 수가 너무 많으면 모델이 훈련 데이터의 노이즈까지 학습하게 됩니다.
                    </p>
                    <div class="bg-blue-50 p-4 rounded-lg">
                        <h4 class="text-sm font-bold text-blue-800 mb-1">관련 핵심 개념</h4>
                        <p class="text-xs text-blue-600 uppercase font-semibold">#L1/L2_Regularization #Feature_Selection</p>
                    </div>
                </div>

                <!-- AI 질문하기(채팅) -->
                <div class="space-y-4">
                    <div class="flex gap-3">
                        <div class="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center text-xs">U</div>
                        <div class="bg-gray-200 px-4 py-2 rounded-2xl rounded-tl-none text-sm max-w-[80%]">
                            "드롭아웃"이 정확히 어떤 원리인가요?
                        </div>
                    </div>
                </div>
            </div>

            <!-- 하단 입력창 -->
            <div class="p-4 bg-white border-t">
                <div class="relative flex items-center">
                    <input type="text" placeholder="AI에게 이 문제에 대해 더 물어보세요..." 
                           class="w-full bg-gray-100 border-none rounded-full py-3 px-6 pr-12 focus:ring-2 focus:ring-blue-400 outline-none text-sm">
                    <button class="absolute right-4 text-blue-600 hover:text-blue-800">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </aside>

    </main>

</body>
</html>
